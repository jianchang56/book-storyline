name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate published books
        run: python skills/publish-storyline-book/scripts/validate_library.py content

      - name: Check formatting and lint rules
        run: pnpm check

      - name: Check types
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build site
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
